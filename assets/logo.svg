<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- HoodBazaar — Robin Hood hat on Robinhood green -->
  <rect width="512" height="512" rx="116" fill="#00C805"/>
  <!-- feather, tucked behind the peak -->
  <g transform="translate(-10 12) rotate(-36 366 150)">
    <path d="M 366 62 C 390 96, 396 160, 366 224 C 336 160, 342 96, 366 62 Z" fill="#FFFFFF"/>
    <line x1="366" y1="80" x2="366" y2="210" stroke="#00C805" stroke-width="8"/>
  </g>
  <!-- crown -->
  <path d="M 118 344
           C 138 252, 200 168, 306 152
           C 330 148, 348 162, 350 186
           C 356 252, 374 304, 394 344
           Z" fill="#FFFFFF"/>
  <!-- brim -->
  <path d="M 82 354 Q 256 326 430 354" fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
</svg>
